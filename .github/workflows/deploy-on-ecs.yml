name: Deploy to ECS cluster using Jenkins Agent

on: 
    workflow_call:
        inputs:
            # Common inputs
            image_name:
                description: "Repositry + Repo name (Use it in this way:- Calance-US/repo_name)"
                required: true
                type: string            
            release_name:
                description: "Release Name"
                required: true
                type: string
            service_name:
                description: "Service Name"
                required: true
                type: string
            version:
                description: "Application version"
                required: true
                type: string
            cluster_environment:
                description: "Cluster Environment"
                required: true
                type: string
            aws_region:
                description: "AWS Region Name"
                required: true
                type: string
            codeowners_email_ids:
                description: Email-ID of CodeOwner/s (If multiple codeowners, seperate email ids with comma)
                required: true
                type: string
            devops_stakeholders_email_ids:
                description: Email-ID of DevOps Stakeholders (If multiple stakeholders, seperate email ids with comma)
                required: true
                type: string
            workflows_release:
                description: "Workflows Release Version of desired workflow"
                required: true
                type: string
            
            # ECS-specific inputs
            ecs_cluster:
                description: "ECS cluster name (ECS only)"
                required: false
                type: string
            ecs_service:
                description: "ECS service name (ECS only)"
                required: false
                type: string
            ecs_task_definition_name:
                description: "name of the task defination"
                required: false
                type: string
                default: ".aws/task-definition.json"
            ecs_desired_count:
                description: "Desired number of tasks in ECS service (ECS only)"
                required: false
                type: string
                default: "2"
            enable_rollback:
                description: "Enable automatic rollback on deployment failure (ECS only)"
                required: false
                type: boolean
                default: false

            # cpu_per_container:
            #     description: "CPU required per Container (eg. 512)"
            #     required: false
            #     type: string
            #     default: "512"
            # memory_per_container:
            #     description: "Memory required per Container (eg. 1024)"
            #     required: false
            #     type: string
            #     default: "1024"
            # tcp_port:
            #     description: "TCP port application will run on."
            #     required: true
            #     type: string

        secrets:
            AWS_ACCESS_KEY_ID:
                required: true
                description: "AWS Access Key for the User"
            AWS_SECRET_ACCESS_KEY:
                required: true
                description: "AWS Secret Key for the User"
            SMTP_PASSWORD:
                required: true
                description: SMTP Server Password
                
jobs:
    notify-deployment-start:
        runs-on: ubuntu-latest
        steps:
        - name: Notify about beginning of deployment
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: Deployment Notification of ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We are pleased to inform you that a deployment process for ${{ inputs.release_name }} is about to commence.

                Deployment Details:

                    Application: ${{ inputs.release_name }}
                    Version: ${{ inputs.version }}
                    Environment: ${{ inputs.cluster_environment }}
                    AWS Region: ${{ inputs.aws_region }}
                    Workflows Release: ${{ inputs.workflows_release }}
                
                Best Regards,
                DevOps Team

    # ECS Deployment
    deploy-to-ecs:
        runs-on: ubuntu-latest
        needs: [notify-deployment-start]
        environment:
          name: ${{ inputs.cluster_environment }}
        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ inputs.aws_region }}
            
        - name: Set IMAGE_REGISTRY and AWS_ACCOUNT_ID
          run: |
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
            echo "IMAGE_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com" >> $GITHUB_ENV
            
        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Prepare image URI
          id: image-uri
          run: |
            IMAGE_URI="${{ env.IMAGE_REGISTRY }}/${{ inputs.image_name }}:${{ inputs.version }}"
            echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

        - name: Check ECS cluster, service, and task definition existence
          run: |
            CLUSTER_EXISTS=$(aws ecs describe-clusters --clusters "${{ inputs.ecs_cluster }}" --query 'clusters[0].status' --output text 2>/dev/null || echo "NONE")
            if [ "$CLUSTER_EXISTS" = "NONE" ]; then
              echo "Cluster ${{ inputs.ecs_cluster }} does not exist"
              exit 1
            fi
          
            SERVICE_EXISTS=$(aws ecs describe-services --cluster "${{ inputs.ecs_cluster }}" --services "${{ inputs.ecs_service }}" --query 'services[0].status' --output text 2>/dev/null || echo "NONE")
            if [ "$SERVICE_EXISTS" = "NONE" ]; then
              echo "Service ${{ inputs.ecs_service }} does not exist"
              exit 1
            fi
          
            TASKDEF_EXISTS=$(aws ecs describe-task-definition --task-definition "${{ inputs.ecs_task_definition_name }}" --query 'taskDefinition.taskDefinitionArn' --output text 2>/dev/null || echo "NONE")
            if [ "$TASKDEF_EXISTS" = "NONE" ]; then
              echo "Task definition ${{ inputs.ecs_task_definition_name }} does not exist"
              exit 1
            fi
          
            echo "Cluster, service, and task definition exist ✅"

        - name: Download existing ECS task definition
          id: download-task-def
          run: |
            aws ecs describe-task-definition \
              --task-definition "${{ inputs.ecs_task_definition_name }}" \
              --query taskDefinition \
              --output json > task-definition.json

        - name: Retrieve secrets from AWS secrets manager
          id: get-secrets
          run: |
            SECRET_PATH="${{inputs.service_name}}-${{inputs.cluster_environment}}"
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_PATH" \
              --region "${{ inputs.aws_region }}" \
              --query SecretString \
              --output text)

            if [ -n "$SECRET_JSON" ] && [ "$SECRET_JSON" != "null" ]; then
              ENV_JSON=$(echo "$SECRET_JSON" | jq -c 'to_entries | map({name: .key, value: .value})')
            else
              ENV_JSON="[]"
            fi

            ESCAPED_ENV_JSON=$(echo "$ENV_JSON" | jq -Rs '.')
            echo "env_json=$ENV_JSON" >> $GITHUB_OUTPUT

        - name: Update ECS task definition with new image and env
          run: |
            # Remove invalid ECS fields
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
              task-definition.json > temp-task-def.json

            # Unescape the JSON before passing to jq
            ENV_JSON=$(echo '${{ steps.get-secrets.outputs.env_json }}' | jq -r '.')

            jq --arg IMAGE "${{ steps.image-uri.outputs.image_uri }}" \
               --argjson ENV "$ENV_JSON" \
               '.containerDefinitions[0].image = $IMAGE | .containerDefinitions[0].environment = $ENV' \
               temp-task-def.json > updated-task-definition.json


        - name: Register updated ECS task definition
          id: task-def
          run: |
            cat temp-task-def.json \
            cat updated-task-defination.json \
            NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json file://updated-task-definition.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
            echo "task_definition=$NEW_TASK_DEF_ARN" >> $GITHUB_OUTPUT

        - name: Store current task definition for rollback
          if: inputs.enable_rollback == true
          run: |
            aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].taskDefinition' \
              --output text > current_task_def.txt

        - name: Deploy to Amazon ECS
          id: deploy
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: ${{ steps.task-def.outputs.task_definition }}
            service: ${{ inputs.ecs_service }}
            cluster: ${{ inputs.ecs_cluster }}
            desired-count: ${{ inputs.ecs_desired_count }}
            wait-for-service-stability: true
            wait-for-minutes: 15

        - name: Verify deployment success
          id: verify
          run: |
            echo "Verifying ECS deployment..."
            
            SERVICE_STATUS=$(aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].deployments[0].status' \
              --output text)
            
            RUNNING_COUNT=$(aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].runningCount' \
              --output text)
            
            DESIRED_COUNT=$(aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].desiredCount' \
              --output text)
            
            echo "Service Status: $SERVICE_STATUS"
            echo "Running Count: $RUNNING_COUNT"
            echo "Desired Count: $DESIRED_COUNT"
            
            if [ "$SERVICE_STATUS" = "PRIMARY" ] && [ "$RUNNING_COUNT" = "$DESIRED_COUNT" ]; then
              echo "✅ Deployment successful!"
              echo "deployment_status=success" >> $GITHUB_OUTPUT
            else
              echo "❌ Deployment verification failed"
              echo "deployment_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi

        - name: Rollback on failure
          if: failure() && inputs.enable_rollback == true
          run: |
            echo "🔄 Initiating automatic rollback..."
            
            if [ -f current_task_def.txt ]; then
              PREVIOUS_TASK_DEF=$(cat current_task_def.txt)
              echo "Rolling back to: $PREVIOUS_TASK_DEF"
              
              aws ecs update-service \
                --cluster ${{ inputs.ecs_cluster }} \
                --service ${{ inputs.ecs_service }} \
                --task-definition $PREVIOUS_TASK_DEF \
                --force-new-deployment
              
              echo "Rollback initiated. Waiting for service stability..."
              aws ecs wait services-stable \
                --cluster ${{ inputs.ecs_cluster }} \
                --services ${{ inputs.ecs_service }}
              
              echo "✅ Rollback completed successfully"
            else
              echo "❌ No previous task definition found for rollback"
            fi

        - name: Display deployment summary
          if: always()
          run: |
            echo "=================================================="
            echo "           ECS DEPLOYMENT SUMMARY"
            echo "=================================================="
            echo "Application: ${{ inputs.release_name }}"
            echo "Version: ${{ inputs.version }}"
            echo "Environment: ${{ inputs.cluster_environment }}"
            echo "Image: ${{ steps.image-uri.outputs.image_uri }}"
            echo "Cluster: ${{ inputs.ecs_cluster }}"
            echo "Service: ${{ inputs.ecs_service }}"
            echo "Region: ${{ inputs.aws_region }}"
            echo "=================================================="

    # Success notification
    notify-deployment-success:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && (needs.deploy-to-ec2.result == 'success' || needs.deploy-to-ecs.result == 'success')
        steps:
        - name: Notify deployment success
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: ✅ Deployment Success - ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                Great news! The deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has completed successfully.

                Deployment Details:
                    ✅ Status: SUCCESS
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🌐 Region: ${{ inputs.aws_region }}
                    ⚙️  Workflows Version: ${{ inputs.workflows_release }}

                The application is now live and ready for use.
                
                Best Regards,
                DevOps Team

    # Failure notification
    notify-deployment-failure:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && (needs.deploy-to-ec2.result == 'failure' || needs.deploy-to-ecs.result == 'failure')
        steps:
        - name: Notify when deployment fails
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: 🚨 Deployment Failure Alert - ${{ inputs.release_name }}:${{ inputs.version }} - CodeOwners Attention Required
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We regret to inform you that the deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has encountered an unexpected issue and has failed.

                Deployment Details:
                    ❌ Status: FAILED
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🌐 Region: ${{ inputs.aws_region }}
                    ⚙️  Workflows Version: ${{ inputs.workflows_release }}

                Next Steps:
                1. Check the GitHub Actions logs for detailed error information
                2. Verify the deployment configuration and prerequisites
                3. Contact the DevOps team if assistance is needed

                We kindly request your prompt attention to address the deployment failure. To streamline communication and expedite the resolution process, please connect directly with us.
                
                Best Regards,
                DevOps Team