name: Deploy to ECS cluster using Jenkins Agent

on: 
    workflow_call:
        inputs:
            # Common inputs
            image_name:
                description: "Image name (Use it in this way:- Calance-US/repo-name)"
                required: true
                type: string
            service_name:
                description: "Service/Repository name"
                required: false
                type: string
                default: "${{ github.event.repository.name }}"
            release_name:
                description: "Release Name"
                required: true
                type: string
            version:
                description: "Application version"
                required: true
                type: string
            cluster_environment:
                description: "Cluster Environment"
                required: true
                type: string
            aws_region:
                description: "AWS Region Name"
                required: true
                type: string
            codeowners_email_ids:
                description: Email-ID of CodeOwner/s (If multiple codeowners, seperate email ids with comma)
                required: true
                type: string
            devops_stakeholders_email_ids:
                description: Email-ID of DevOps Stakeholders (If multiple stakeholders, seperate email ids with comma)
                required: true
                type: string
            workflows_release:
                description: "Workflows Release Version of current deployment"
                required: true
                type: string
            
            # ECS-specific inputs
            ecs_cluster:
                description: "ECS cluster name (ECS only)"
                required: false
                type: string
            ecs_service:
                description: "ECS service name (ECS only)"
                required: false
                type: string
            ecs_task_definition_path:
                description: "Path to ECS task definition file (ECS only)"
                required: false
                type: string
                default: ".aws/task-definition.json"
            container_name:
                description: "Container name in ECS task definition (ECS only)"
                required: false
                type: string
            ecs_desired_count:
                description: "Desired number of tasks in ECS service (ECS only)"
                required: false
                type: string
                default: "2"
            health_check_grace_period:
                description: "Health check grace period in seconds (ECS only)"
                required: false
                type: string
                default: "60"
            deployment_configuration_max_percent:
                description: "Maximum percentage of tasks during deployment (ECS only)"
                required: false
                type: string
                default: "200"
            deployment_configuration_min_percent:
                description: "Minimum percentage of tasks during deployment (ECS only)"
                required: false
                type: string
                default: "50"
            enable_rollback:
                description: "Enable automatic rollback on deployment failure (ECS only)"
                required: false
                type: boolean
                default: false

        secrets:
            JENKINS_URL:
                required: true
                description: "Jenkins URL"
            JENKINS_USER:
                required: true
                description: "Jenkins USER"
            JENKINS_TOKEN:
                required: true
                description: "Jenkins TOKEN"
            AWS_ACCESS_KEY_ID:
                required: true
                description: "AWS Access Key for the User"
            AWS_SECRET_ACCESS_KEY:
                required: true
                description: "AWS Secret Key for the User"
            SMTP_PASSWORD:
                required: true
                description: SMTP Server Password
                
jobs:
    notify-deployment-start:
        runs-on: ubuntu-latest
        steps:
        - name: Notify about beginning of deployment
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: Deployment Notification of ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We are pleased to inform you that a deployment process for ${{ inputs.release_name }} is about to commence.

                Deployment Details:

                    Application: ${{ inputs.release_name }}
                    Version: ${{ inputs.version }}
                    Environment: ${{ inputs.cluster_environment }}
                    AWS Region: ${{ inputs.aws_region }}
                    Workflows Release: ${{ inputs.workflows_release }}
                
                Best Regards,
                DevOps Team

    # ECS Deployment
    deploy-to-ecs:
        runs-on: ubuntu-latest
        needs: [notify-deployment-start]
        environment:
          name: ${{ inputs.cluster_environment }}
        steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Validate ECS required inputs
          run: |
            if [ -z "${{ inputs.ecs_cluster }}" ] || [ -z "${{ inputs.ecs_service }}" ]; then
              echo "Error: Missing required inputs for ECS deployment"
              echo "Required: ecs_cluster, ecs_service"
              exit 1
            fi

        - name: Configure AWS credentials (Access Keys fallback)
          if: secrets.AWS_ROLE_ARN == ''
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ inputs.aws_region }}

        - name: Login to Amazon ECR
          if: contains(inputs.image_registry, 'amazonaws.com')
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Prepare image URI
          id: image-uri
          run: |
            if [[ "${{ inputs.image_registry }}" == *"amazonaws.com"* ]]; then
              # ECR format
              IMAGE_URI="${{ inputs.image_registry }}/${{ inputs.image_name }}:${{ inputs.version }}"
            else
              # Other registries
              IMAGE_URI="${{ inputs.image_registry }}/${{ inputs.image_name }}:${{ inputs.version }}"
            fi
            echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
            echo "Using image URI: $IMAGE_URI"

        - name: Check if task definition file exists
          id: check-task-def
          run: |
            if [ -f "${{ inputs.ecs_task_definition_path }}" ]; then
              echo "task_def_exists=true" >> $GITHUB_OUTPUT
            else
              echo "task_def_exists=false" >> $GITHUB_OUTPUT
            fi

        - name: Create default task definition if not exists
          if: steps.check-task-def.outputs.task_def_exists == 'false'
          run: |
            mkdir -p .aws
            cat > ${{ inputs.ecs_task_definition_path }} << EOF
            {
              "family": "${{ inputs.ecs_service }}",
              "networkMode": "awsvpc",
              "requiresCompatibilities": ["FARGATE"],
              "cpu": "512",
              "memory": "1024",
              "executionRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
              "taskRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskRole",
              "containerDefinitions": [
                {
                  "name": "${{ inputs.container_name || inputs.service_name }}",
                  "image": "placeholder-image",
                  "essential": true,
                  "portMappings": [
                    {
                      "containerPort": 80,
                      "protocol": "tcp"
                    }
                  ],
                  "logConfiguration": {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": "/ecs/${{ inputs.ecs_service }}",
                      "awslogs-region": "${{ inputs.aws_region }}",
                      "awslogs-stream-prefix": "ecs"
                    }
                  },
                  "environment": [
                    {
                      "name": "ENVIRONMENT",
                      "value": "${{ inputs.cluster_environment }}"
                    }
                  ]
                }
              ]
            }
            EOF
          env:
            AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}

        - name: Get AWS Account ID
          run: |
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

        - name: Update ECS task definition
          id: task-def
          uses: aws-actions/amazon-ecs-render-task-definition@v1
          with:
            task-definition: ${{ inputs.ecs_task_definition_path }}
            container-name: ${{ inputs.container_name || inputs.service_name }}
            image: ${{ steps.image-uri.outputs.image_uri }}

        - name: Store current task definition for rollback
          if: inputs.enable_rollback == true
          run: |
            aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].taskDefinition' \
              --output text > current_task_def.txt
            echo "Current task definition stored for potential rollback"

        - name: Deploy to Amazon ECS
          id: deploy
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: ${{ steps.task-def.outputs.task-definition }}
            service: ${{ inputs.ecs_service }}
            cluster: ${{ inputs.ecs_cluster }}
            wait-for-service-stability: true
            wait-for-minutes: 10

        - name: Verify deployment success
          id: verify
          run: |
            echo "Verifying ECS deployment..."
            
            # Get service status
            SERVICE_STATUS=$(aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].deployments[0].status' \
              --output text)
            
            RUNNING_COUNT=$(aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].runningCount' \
              --output text)
            
            DESIRED_COUNT=$(aws ecs describe-services \
              --cluster ${{ inputs.ecs_cluster }} \
              --services ${{ inputs.ecs_service }} \
              --query 'services[0].desiredCount' \
              --output text)
            
            echo "Service Status: $SERVICE_STATUS"
            echo "Running Count: $RUNNING_COUNT"
            echo "Desired Count: $DESIRED_COUNT"
            
            if [ "$SERVICE_STATUS" = "PRIMARY" ] && [ "$RUNNING_COUNT" = "$DESIRED_COUNT" ]; then
              echo "✅ Deployment successful!"
              echo "deployment_status=success" >> $GITHUB_OUTPUT
            else
              echo "❌ Deployment verification failed"
              echo "deployment_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi

        - name: Rollback on failure
          if: failure() && inputs.enable_rollback == true
          run: |
            echo "🔄 Initiating automatic rollback..."
            
            if [ -f current_task_def.txt ]; then
              PREVIOUS_TASK_DEF=$(cat current_task_def.txt)
              echo "Rolling back to: $PREVIOUS_TASK_DEF"
              
              aws ecs update-service \
                --cluster ${{ inputs.ecs_cluster }} \
                --service ${{ inputs.ecs_service }} \
                --task-definition $PREVIOUS_TASK_DEF \
                --force-new-deployment
              
              echo "Rollback initiated. Waiting for service stability..."
              aws ecs wait services-stable \
                --cluster ${{ inputs.ecs_cluster }} \
                --services ${{ inputs.ecs_service }}
              
              echo "✅ Rollback completed successfully"
            else
              echo "❌ No previous task definition found for rollback"
            fi

        - name: Display deployment summary
          if: always()
          run: |
            echo "=================================================="
            echo "           ECS DEPLOYMENT SUMMARY"
            echo "=================================================="
            echo "Application: ${{ inputs.release_name }}"
            echo "Version: ${{ inputs.version }}"
            echo "Environment: ${{ inputs.cluster_environment }}"
            echo "Image: ${{ steps.image-uri.outputs.image_uri }}"
            echo "Cluster: ${{ inputs.ecs_cluster }}"
            echo "Service: ${{ inputs.ecs_service }}"
            echo "Region: ${{ inputs.aws_region }}"
            echo "=================================================="

    # Success notification
    notify-deployment-success:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && (needs.deploy-to-ec2.result == 'success' || needs.deploy-to-ecs.result == 'success')
        steps:
        - name: Notify deployment success
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: ✅ Deployment Success - ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                Great news! The deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has completed successfully.

                Deployment Details:
                    ✅ Status: SUCCESS
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🌐 Region: ${{ inputs.aws_region }}
                    ⚙️  Workflows Version: ${{ inputs.workflows_release }}

                The application is now live and ready for use.
                
                Best Regards,
                DevOps Team

    # Failure notification
    notify-deployment-failure:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && (needs.deploy-to-ec2.result == 'failure' || needs.deploy-to-ecs.result == 'failure')
        steps:
        - name: Notify when deployment fails
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: 🚨 Deployment Failure Alert - ${{ inputs.release_name }}:${{ inputs.version }} - CodeOwners Attention Required
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We regret to inform you that the deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has encountered an unexpected issue and has failed.

                Deployment Details:
                    ❌ Status: FAILED
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🌐 Region: ${{ inputs.aws_region }}
                    ⚙️  Workflows Version: ${{ inputs.workflows_release }}

                Next Steps:
                1. Check the GitHub Actions logs for detailed error information
                2. Verify the deployment configuration and prerequisites
                3. Contact the DevOps team if assistance is needed

                We kindly request your prompt attention to address the deployment failure. To streamline communication and expedite the resolution process, please connect directly with us.
                
                Best Regards,
                DevOps Team