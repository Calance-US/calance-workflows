name: Deploy to ECS cluster using Jenkins Agent

on: 
    workflow_call:
        inputs:
            image_name:
                description: "Repositry + Repo name (Use it in this way:- Calance-US/repo_name)"
                required: true
                type: string            
            release_name:
                description: "Release Name"
                required: true
                type: string
            service_name:
                description: "Service Name"
                required: false
                type: string
                default: "${{ github.event.repository.name }}"
            version:
                description: "Application version"
                required: true
                type: string
            cluster_environment:
                description: "Cluster Environment"
                required: true
                type: string
            aws_region:
                description: "AWS Region Name"
                required: true
                type: string
            codeowners_email_ids:
                description: Email-ID of CodeOwner/s (If multiple codeowners, seperate email ids with comma)
                required: true
                type: string
            devops_stakeholders_email_ids:
                description: Email-ID of DevOps Stakeholders (If multiple stakeholders, seperate email ids with comma)
                required: true
                type: string
            
            # ECS specific
            ecs_launch_type:
                description: "ECS launch type: FARGATE or EC2"
                required: false
                type: string
                default: "EC2"
            ecs_cluster:
                description: "ECS cluster name"
                required: true
                type: string
            ecs_service:
                description: "ECS service name"
                required: true
                type: string
            ecs_task_definition_name:
                description: "Name of the task definition"
                required: true
                type: string
            ecs_desired_count:
                description: "Desired number of tasks in ECS service"
                required: true
                type: string
            ecs_wait_time:
                description: "ECS stability wait time in minutes"
                required: false
                type: string
                default: "10"
            SMTP_HOST: 
                required: true
                description: "SMTP Server Host"
                type: string
            SMTP_USER: 
                required: true
                description: "SMTP Server User"
                type: string
            SMTP_PORT:
                required: true
                description: "SMTP Server Port"
                type: string
        secrets:
            AWS_ACCESS_KEY_ID:
                required: true
            AWS_SECRET_ACCESS_KEY:
                required: true
            SMTP_PASSWORD:
                required: true
            AWS_SESSION_TOKEN:
                required: false

jobs:
    deploy-to-ecs:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ inputs.aws_region }}

        - name: Set IMAGE_REGISTRY and AWS_ACCOUNT_ID
          run: |
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"
            echo "IMAGE_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com" >> "$GITHUB_ENV"

        - name: Login to Amazon ECR
          uses: aws-actions/amazon-ecr-login@v2

        - name: Prepare image URI
          id: image-uri
          run: |
            IMAGE_URI="${{ env.IMAGE_REGISTRY }}/${{ inputs.image_name }}:${{ inputs.version }}"
            echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

        - name: Check ECS cluster, service, and task definition existence
          run: |
            CLUSTER_EXISTS=$(aws ecs describe-clusters \
              --clusters "${{ inputs.ecs_cluster }}" \
              --query 'clusters[0].status' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$CLUSTER_EXISTS" = "NONE" ] || [ "$CLUSTER_EXISTS" = "None" ]; then
              echo "❌ Cluster ${{ inputs.ecs_cluster }} does not exist"
              exit 1
            fi
          
            SERVICE_EXISTS=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].status' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$SERVICE_EXISTS" = "NONE" ] || [ "$SERVICE_EXISTS" = "None" ]; then
              echo "❌ Service ${{ inputs.ecs_service }} does not exist"
              exit 1
            fi
          
            TASKDEF_EXISTS=$(aws ecs describe-task-definition \
              --task-definition "${{ inputs.ecs_task_definition_name }}" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$TASKDEF_EXISTS" = "NONE" ] || [ "$TASKDEF_EXISTS" = "None" ]; then
              echo "❌ Task definition ${{ inputs.ecs_task_definition_name }} does not exist"
              exit 1
            fi

            # ✅ FIXED VALIDATION (capacity provider aware)
            CAPACITY_PROVIDER=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].capacityProviderStrategy[0].capacityProvider' \
              --output text 2>/dev/null || echo "NONE")

            echo "Detected capacity provider: $CAPACITY_PROVIDER"

            if [[ "$CAPACITY_PROVIDER" == *"FARGATE"* ]]; then
              SERVICE_TYPE="FARGATE"
            else
              SERVICE_TYPE="EC2"
            fi

            if [ "$SERVICE_TYPE" != "${{ inputs.ecs_launch_type }}" ]; then
              echo "❌ Launch type mismatch: service is '$SERVICE_TYPE' but input specifies '${{ inputs.ecs_launch_type }}'"
              exit 1
            fi
          
            echo "✅ Cluster, service, and task definition exist"
            echo "✅ Launch type validated: $SERVICE_TYPE"

        - name: Download existing ECS task definition
          run: |
            aws ecs describe-task-definition \
              --task-definition "${{ inputs.ecs_task_definition_name }}" \
              --query taskDefinition \
              --output json > task-definition.json

        - name: Update ECS task definition
          run: |
            jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
              task-definition.json > clean-task-def.json
            
            jq --arg IMAGE "${{ steps.image-uri.outputs.image_uri }}" \
               '.containerDefinitions[0].image = $IMAGE' \
               clean-task-def.json > updated-task-definition.json

        - name: Deploy to ECS
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: updated-task-definition.json 
            service: ${{ inputs.ecs_service }}
            cluster: ${{ inputs.ecs_cluster }}
            desired-count: ${{ inputs.ecs_desired_count }}
            wait-for-service-stability: true
            wait-for-minutes: ${{ inputs.ecs_wait_time }}

        - name: Verify deployment success
          id: verify
          run: |
            echo "Verifying ECS deployment..."
            
            SERVICE_STATUS=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].deployments[0].status' \
              --output text)
            
            RUNNING_COUNT=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].runningCount' \
              --output text)
            
            DESIRED_COUNT=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].desiredCount' \
              --output text)
            
            echo "Service Status : $SERVICE_STATUS"
            echo "Running Count  : $RUNNING_COUNT"
            echo "Desired Count  : $DESIRED_COUNT"
            
            if [ "$SERVICE_STATUS" = "PRIMARY" ] && [ "$RUNNING_COUNT" = "$DESIRED_COUNT" ]; then
              echo "✅ Deployment successful!"
              echo "deployment_status=success" >> "$GITHUB_OUTPUT"
            else
              echo "❌ Deployment verification failed"
              echo "deployment_status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi

        - name: Display deployment summary
          if: always()
          run: |
            echo "=================================================="
            echo "           ECS DEPLOYMENT SUMMARY"
            echo "=================================================="
            echo "Application  : ${{ inputs.release_name }}"
            echo "Version      : ${{ inputs.version }}"
            echo "Environment  : ${{ inputs.cluster_environment }}"
            echo "Launch Type  : ${{ inputs.ecs_launch_type }}"
            echo "Image        : ${{ steps.image-uri.outputs.image_uri }}"
            echo "Cluster      : ${{ inputs.ecs_cluster }}"
            echo "Service      : ${{ inputs.ecs_service }}"
            echo "Region       : ${{ inputs.aws_region }}"
            echo "=================================================="

    notify-deployment-success:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && needs.deploy-to-ecs.result == 'success'
        steps:
        - name: Notify deployment success
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: ✅ Deployment Success - ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                Great news! The deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has completed successfully.

                Deployment Details:
                    ✅ Status: SUCCESS
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🚀 Launch Type: ${{ inputs.ecs_launch_type }}
                    🌐 Region: ${{ inputs.aws_region }}

                The application is now live and ready for use.
                
                Best Regards,
                DevOps Team

    notify-deployment-failure:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && needs.deploy-to-ecs.result == 'failure'
        steps:
        - name: Notify when deployment fails
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: 🚨 Deployment Failure Alert - ${{ inputs.release_name }}:${{ inputs.version }} - CodeOwners Attention Required
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We regret to inform you that the deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has encountered an unexpected issue and has failed.

                Deployment Details:
                    ❌ Status: FAILED
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🚀 Launch Type: ${{ inputs.ecs_launch_type }}
                    🌐 Region: ${{ inputs.aws_region }}

                Next Steps:
                1. Check the GitHub Actions logs for detailed error information
                2. Verify the deployment configuration and prerequisites
                3. Contact the DevOps team if assistance is needed

                We kindly request your prompt attention to address the deployment failure.
                
                Best Regards,
                DevOps Team
