name: Deploy to ECS cluster using Jenkins Agent

on: 
    workflow_call:
        inputs:
            image_name:
                description: "Repositry + Repo name (Use it in this way:- Calance-US/repo_name)"
                required: true
                type: string            
            release_name:
                description: "Release Name"
                required: true
                type: string
            service_name:
                description: "Service Name"
                required: false
                type: string
                default: "${{ github.event.repository.name }}"
            version:
                description: "Application version"
                required: true
                type: string
            cluster_environment:
                description: "Cluster Environment"
                required: true
                type: string
            aws_region:
                description: "AWS Region Name"
                required: true
                type: string
            codeowners_email_ids:
                description: Email-ID of CodeOwner/s (If multiple codeowners, seperate email ids with comma)
                required: true
                type: string
            devops_stakeholders_email_ids:
                description: Email-ID of DevOps Stakeholders (If multiple stakeholders, seperate email ids with comma)
                required: true
                type: string
            
            # ECS specific
            ecs_launch_type:
                description: "ECS launch type: FARGATE or EC2"
                required: false
                type: string
                default: "EC2"
            ecs_cluster:
                description: "ECS cluster name"
                required: true
                type: string
            ecs_service:
                description: "ECS service name"
                required: true
                type: string
            ecs_task_definition_name:
                description: "Name of the task definition"
                required: true
                type: string
            ecs_desired_count:
                description: "Desired number of tasks in ECS service"
                required: true
                type: string
            ecs_wait_time:
                description: "ECS stability wait time in minutes"
                required: false
                type: string
                default: "10"
            SMTP_HOST: 
                required: true
                description: SMTP Server Host
            SMTP_USER: 
                required: true
                description: SMTP Server User
            SMTP_PORT:
                required: true
                description: SMTP Server Port
        secrets:
            AWS_ACCESS_KEY_ID:
                required: true
                description: "AWS Access Key for the User"
            AWS_SECRET_ACCESS_KEY:
                required: true
                description: "AWS Secret Key for the User"
            SMTP_PASSWORD:
                required: true
                description: SMTP Server Password
            AWS_SESSION_TOKEN:
                required: true
                description: "AWS Session Token (required only when using temporary ASIA credentials)"
            
                
jobs:
    notify-deployment-start:
        runs-on: ubuntu-latest
        steps:
        - name: Notify about beginning of deployment
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: Deployment Notification of ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We are pleased to inform you that a deployment process for ${{ inputs.release_name }} is about to commence.

                Deployment Details:

                    Application: ${{ inputs.release_name }}
                    Version: ${{ inputs.version }}
                    Environment: ${{ inputs.cluster_environment }}
                    Launch Type: ${{ inputs.ecs_launch_type }}
                    AWS Region: ${{ inputs.aws_region }}
                
                Best Regards,
                DevOps Team

    deploy-to-ecs:
        runs-on: ubuntu-latest
        needs: [notify-deployment-start]
        environment:
          name: ${{ inputs.cluster_environment }}
        steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ inputs.aws_region }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

        - name: Set IMAGE_REGISTRY and AWS_ACCOUNT_ID
          run: |
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"
            echo "IMAGE_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com" >> "$GITHUB_ENV"

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Prepare image URI
          id: image-uri
          run: |
            IMAGE_URI="${{ env.IMAGE_REGISTRY }}/${{ inputs.image_name }}:${{ inputs.version }}"
            echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

        - name: Check ECS cluster, service, and task definition existence
          run: |
            CLUSTER_EXISTS=$(aws ecs describe-clusters \
              --clusters "${{ inputs.ecs_cluster }}" \
              --query 'clusters[0].status' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$CLUSTER_EXISTS" = "NONE" ] || [ "$CLUSTER_EXISTS" = "None" ]; then
              echo "❌ Cluster ${{ inputs.ecs_cluster }} does not exist"
              exit 1
            fi
          
            SERVICE_EXISTS=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].status' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$SERVICE_EXISTS" = "NONE" ] || [ "$SERVICE_EXISTS" = "None" ]; then
              echo "❌ Service ${{ inputs.ecs_service }} does not exist"
              exit 1
            fi
          
            TASKDEF_EXISTS=$(aws ecs describe-task-definition \
              --task-definition "${{ inputs.ecs_task_definition_name }}" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$TASKDEF_EXISTS" = "NONE" ] || [ "$TASKDEF_EXISTS" = "None" ]; then
              echo "❌ Task definition ${{ inputs.ecs_task_definition_name }} does not exist"
              exit 1
            fi

            # Validate service launch type matches input
            SERVICE_LAUNCH_TYPE=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].launchType' \
              --output text 2>/dev/null || echo "NONE")
            if [ "$SERVICE_LAUNCH_TYPE" != "${{ inputs.ecs_launch_type }}" ]; then
              echo "❌ Launch type mismatch: service is '$SERVICE_LAUNCH_TYPE' but input specifies '${{ inputs.ecs_launch_type }}'"
              exit 1
            fi
          
            echo "✅ Cluster, service, and task definition exist"
            echo "✅ Launch type validated: $SERVICE_LAUNCH_TYPE"

        - name: Download existing ECS task definition
          run: |
            aws ecs describe-task-definition \
              --task-definition "${{ inputs.ecs_task_definition_name }}" \
              --query taskDefinition \
              --output json > task-definition.json

            echo "📋 Current task definition summary:"
            echo "  Network Mode     : $(jq -r '.networkMode // "not set"' task-definition.json)"
            echo "  Compatibilities  : $(jq -r '.requiresCompatibilities // [] | join(", ")' task-definition.json)"
            echo "  CPU              : $(jq -r '.cpu // "not set"' task-definition.json)"
            echo "  Memory           : $(jq -r '.memory // "not set"' task-definition.json)"
            echo "  Current Image    : $(jq -r '.containerDefinitions[0].image' task-definition.json)"

        - name: Retrieve secrets from AWS Secrets Manager
          run: |
            SECRET_PATH="${{ inputs.service_name }}-${{ inputs.cluster_environment }}"
                
            aws secretsmanager get-secret-value \
              --secret-id "$SECRET_PATH" \
              --region "${{ inputs.aws_region }}" \
              --query SecretString \
              --output text > raw_secrets.json
                
            if [ ! -s raw_secrets.json ] || [ "$(cat raw_secrets.json)" = "null" ]; then
              echo "[]" > env_variables.json
              echo "⚠️  No secrets found or secret is null"
            else
              jq -c '
                if type == "object" then
                  to_entries 
                  | map(select(.key | test("^(GITHUB_|RUNNER_|CI|ACTIONS_|SYSTEM_|BASH_|SHELL|PATH|HOME|USER|PWD)") | not))
                  | map({
                      name: .key, 
                      value: (if .value == null then "" else (.value | tostring) end)
                    })
                else
                  []
                end
              ' raw_secrets.json > env_variables.json
            fi

        - name: Update ECS task definition
          run: |
            # Strip read-only AWS fields before re-registering
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
              task-definition.json > clean-task-def.json
            
            # Only update image and environment variables
            # All other fields (cpu, memory, roles, networkMode, etc.)
            # are preserved exactly as defined in the existing task definition
            jq --arg IMAGE "${{ steps.image-uri.outputs.image_uri }}" \
               --slurpfile ENV_VARS env_variables.json \
               '.containerDefinitions[0].image = $IMAGE |
                .containerDefinitions[0].environment = $ENV_VARS[0]' \
               clean-task-def.json > updated-task-definition.json

            echo "✅ Task definition updated"
            echo "  New Image : $(jq -r '.containerDefinitions[0].image' updated-task-definition.json)"
            echo "  Env Vars  : $(jq '.containerDefinitions[0].environment | length' updated-task-definition.json) variable(s) injected"

        - name: Validate updated task definition
          run: |
            echo "📋 Validating updated task definition..."

            UPDATED_IMAGE=$(jq -r '.containerDefinitions[0].image' updated-task-definition.json)
            if [ "$UPDATED_IMAGE" != "${{ steps.image-uri.outputs.image_uri }}" ]; then
              echo "❌ Image mismatch in updated task definition"
              echo "   Expected : ${{ steps.image-uri.outputs.image_uri }}"
              echo "   Got      : $UPDATED_IMAGE"
              exit 1
            fi

            # Warn if task def is missing Fargate-required fields
            # (not a hard failure — these should already be set correctly in AWS)
            if [ "${{ inputs.ecs_launch_type }}" = "FARGATE" ]; then
              NETWORK_MODE=$(jq -r '.networkMode // "not set"' updated-task-definition.json)
              CPU=$(jq -r '.cpu // ""' updated-task-definition.json)
              MEMORY=$(jq -r '.memory // ""' updated-task-definition.json)

              [ "$NETWORK_MODE" != "awsvpc" ] && echo "⚠️  Warning: networkMode is '$NETWORK_MODE', expected 'awsvpc' for Fargate"
              [ -z "$CPU" ]                   && echo "⚠️  Warning: cpu is not set at task level in task definition"
              [ -z "$MEMORY" ]                && echo "⚠️  Warning: memory is not set at task level in task definition"
            fi

            echo "✅ Task definition validation passed"

        - name: Clean up sensitive files
          if: always()
          run: |
            rm -f raw_secrets.json env_variables.json clean-task-def.json

        - name: Deploy to Amazon ECS
          id: deploy
          uses: aws-actions/amazon-ecs-deploy-task-definition@v1
          with:
            task-definition: updated-task-definition.json 
            service: ${{ inputs.ecs_service }}
            cluster: ${{ inputs.ecs_cluster }}
            desired-count: ${{ inputs.ecs_desired_count }}
            wait-for-service-stability: true
            wait-for-minutes: ${{ inputs.ecs_wait_time }}

        - name: Verify deployment success
          id: verify
          run: |
            echo "Verifying ECS deployment..."
            
            SERVICE_STATUS=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].deployments[0].status' \
              --output text)
            
            RUNNING_COUNT=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].runningCount' \
              --output text)
            
            DESIRED_COUNT=$(aws ecs describe-services \
              --cluster "${{ inputs.ecs_cluster }}" \
              --services "${{ inputs.ecs_service }}" \
              --query 'services[0].desiredCount' \
              --output text)
            
            echo "Service Status : $SERVICE_STATUS"
            echo "Running Count  : $RUNNING_COUNT"
            echo "Desired Count  : $DESIRED_COUNT"
            
            if [ "$SERVICE_STATUS" = "PRIMARY" ] && [ "$RUNNING_COUNT" = "$DESIRED_COUNT" ]; then
              echo "✅ Deployment successful!"
              echo "deployment_status=success" >> "$GITHUB_OUTPUT"
            else
              echo "❌ Deployment verification failed"
              echo "deployment_status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi

        - name: Display deployment summary
          if: always()
          run: |
            echo "=================================================="
            echo "           ECS DEPLOYMENT SUMMARY"
            echo "=================================================="
            echo "Application  : ${{ inputs.release_name }}"
            echo "Version      : ${{ inputs.version }}"
            echo "Environment  : ${{ inputs.cluster_environment }}"
            echo "Launch Type  : ${{ inputs.ecs_launch_type }}"
            echo "Image        : ${{ steps.image-uri.outputs.image_uri }}"
            echo "Cluster      : ${{ inputs.ecs_cluster }}"
            echo "Service      : ${{ inputs.ecs_service }}"
            echo "Region       : ${{ inputs.aws_region }}"
            echo "=================================================="

    notify-deployment-success:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && needs.deploy-to-ecs.result == 'success'
        steps:
        - name: Notify deployment success
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: ✅ Deployment Success - ${{ inputs.release_name }}:${{ inputs.version }}
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                Great news! The deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has completed successfully.

                Deployment Details:
                    ✅ Status: SUCCESS
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🚀 Launch Type: ${{ inputs.ecs_launch_type }}
                    🌐 Region: ${{ inputs.aws_region }}

                The application is now live and ready for use.
                
                Best Regards,
                DevOps Team

    notify-deployment-failure:
        runs-on: ubuntu-latest
        needs: [deploy-to-ecs]
        if: always() && needs.deploy-to-ecs.result == 'failure'
        steps:
        - name: Notify when deployment fails
          uses: dawidd6/action-send-mail@v3
          with:
            server_address: smtp.office365.com
            server_port: 587
            username: noreply@itrnetwork.com
            password: ${{ secrets.SMTP_PASSWORD }}
            subject: 🚨 Deployment Failure Alert - ${{ inputs.release_name }}:${{ inputs.version }} - CodeOwners Attention Required
            to: ${{ inputs.codeowners_email_ids }}
            from: DevOps Team
            cc: ${{ inputs.devops_stakeholders_email_ids }}
            body: |
                Dear CodeOwner/s,
                
                We regret to inform you that the deployment process for ${{ inputs.release_name }}:${{ inputs.version }} has encountered an unexpected issue and has failed.

                Deployment Details:
                    ❌ Status: FAILED
                    📦 Application: ${{ inputs.release_name }}
                    🔢 Version: ${{ inputs.version }}
                    🌍 Environment: ${{ inputs.cluster_environment }}
                    🚀 Launch Type: ${{ inputs.ecs_launch_type }}
                    🌐 Region: ${{ inputs.aws_region }}

                Next Steps:
                1. Check the GitHub Actions logs for detailed error information
                2. Verify the deployment configuration and prerequisites
                3. Contact the DevOps team if assistance is needed

                We kindly request your prompt attention to address the deployment failure.
                
                Best Regards,
                DevOps Team
